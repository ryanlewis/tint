name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  checks: write
  pull-requests: write

jobs:
  ci:
    name: CI (Lint & Test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m

      - name: Run tests
        run: |
          go install gotest.tools/gotestsum@latest
          gotestsum --junitfile test-results.xml --format github-actions -- -race -count=1 -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: '!cancelled()'
        with:
          files: test-results.xml
          check_name: Test Results

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.txt

  build:
    name: Build
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build all binaries
        run: |
          # Version info from git
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LDFLAGS="-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"

          # Build all target platforms
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          for platform in "${platforms[@]}"; do
            IFS='/' read -r goos goarch <<< "$platform"
            output="tint-${goos}-${goarch}"

            if [ "$goos" = "windows" ]; then
              output="${output}.exe"
            fi

            echo "Building ${output}..."
            GOOS=$goos GOARCH=$goarch go build -v -ldflags "$LDFLAGS" -o "$output" ./cmd/tint
            ls -la "$output"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tint-binaries
          path: tint-*

  verify-modules:
    name: Verify Modules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Verify modules
        run: |
          go mod tidy
          go mod verify
          git diff --exit-code go.mod go.sum

  vuln:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
